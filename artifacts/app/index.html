<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Jojox - عجلة الحظ</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" as="image" href="/bg.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        overflow: hidden;
        background-color: #020e06;
        background-image: url('/bg.jpg');
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        font-family: 'Cairo', sans-serif;
      }
      #root { height: 100%; position: relative; z-index: 1; }

      /* ── Splash Screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: linear-gradient(to bottom, rgba(0,20,10,0.30) 0%, rgba(0,10,5,0.50) 60%, rgba(0,15,8,0.75) 100%);
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .splash-wheel {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: conic-gradient(
          rgba(251,191,36,0.9) 0%,
          rgba(34,197,94,0.9) 16%,
          rgba(251,191,36,0.9) 33%,
          rgba(34,197,94,0.9) 50%,
          rgba(251,191,36,0.9) 66%,
          rgba(34,197,94,0.9) 83%,
          rgba(251,191,36,0.9) 100%
        );
        box-shadow:
          0 0 40px rgba(34,197,94,0.55),
          0 0 80px rgba(34,197,94,0.25),
          0 0 20px rgba(251,191,36,0.4);
        animation: splash-spin 1.6s linear infinite;
        position: relative;
      }
      .splash-wheel::after {
        content: '';
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #0a2e18, #020e06);
      }
      .splash-wheel-x {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
        font-size: 36px;
        font-weight: 900;
        color: rgba(251,191,36,0.95);
        text-shadow: 0 0 18px rgba(251,191,36,0.8);
        animation: splash-spin-counter 1.6s linear infinite;
      }

      .splash-title {
        font-size: 38px;
        font-weight: 900;
        color: #fbbf24;
        text-shadow: 0 0 28px rgba(251,191,36,0.7), 0 2px 8px rgba(0,0,0,0.6);
        letter-spacing: 2px;
        direction: ltr;
      }
      .splash-subtitle {
        font-size: 15px;
        font-weight: 700;
        color: rgba(255,255,255,0.65);
        text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        letter-spacing: 1px;
      }

      .splash-dots {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .splash-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: rgba(251,191,36,0.85);
        box-shadow: 0 0 8px rgba(251,191,36,0.6);
        animation: splash-bounce 1.1s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.18s; background: rgba(34,197,94,0.85); box-shadow: 0 0 8px rgba(34,197,94,0.6); }
      .splash-dot:nth-child(3) { animation-delay: 0.36s; }

      @keyframes splash-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes splash-spin-counter {
        from { transform: rotate(0deg); }
        to   { transform: rotate(-360deg); }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
        40% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash shown immediately before JS loads -->
    <div id="splash">
      <div class="splash-logo">
        <div style="position:relative; width:110px; height:110px;">
          <div class="splash-wheel"></div>
          <div class="splash-wheel-x">✕</div>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div class="splash-title">Jojox</div>
        <div class="splash-subtitle">عجلة الحظ</div>
      </div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
